name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, such as v1.2.3
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  BINARY_NAME: ubuntu-vm-template-builder-linux-amd64
  IMAGE_NAME: ghcr.io/torob/ubuntu-vm-template-builder

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, got: $RELEASE_TAG" >&2
            exit 1
          fi

          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if ! git ls-remote --exit-code --tags "$remote_url" "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Release tag ${RELEASE_TAG} does not exist on origin." >&2
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Resolve source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true

      - name: Install test prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xorriso

      - name: Run tests
        run: go test ./...

      - name: Build release binary
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o "dist/${BINARY_NAME}" .
          (cd dist && sha256sum "${BINARY_NAME}" > "${BINARY_NAME}.sha256")

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "dist/${BINARY_NAME}" \
              "dist/${BINARY_NAME}.sha256" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "dist/${BINARY_NAME}" \
              "dist/${BINARY_NAME}.sha256" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
