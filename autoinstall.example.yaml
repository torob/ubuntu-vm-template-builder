#cloud-config
autoinstall:
  version: 1
  identity:
    hostname: ubuntu-server
    username: sysadmin
    # Generate a real hash with: openssl passwd -6
    password: "$6$rounds=4096$examplesalt$8S1wHb9x2TnI.kOfpB7N8VnHnWUZuk5qLXb7ESk6dDXlkd7kgvBL7kFvHEKz8YrxG4PeZRlCuZmLksJrJpY6X/"
  refresh-installer:
    update: false
  source:
    search_drivers: false
    id: ubuntu-server
  network:
    version: 2
    ethernets: {}
  apt:
    geoip: false
  ssh:
    install-server: true
    authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleReplaceThisKey sysadmin@example
    allow-pw: false
  timezone: "Asia/Tehran"
  locale: en_US.UTF-8
  keyboard:
    layout: us
  storage:
    config:
      - id: disk0
        type: disk
        match:
          size: largest
        ptable: gpt
        wipe: superblock-recursive
        preserve: false
      - id: part-efi
        type: partition
        device: disk0
        size: 512M
        flag: boot
        grub_device: true
      - id: part-boot
        type: partition
        device: disk0
        size: 1G
      - id: part-lvm
        type: partition
        device: disk0
        size: -1
      - id: vg-os
        type: lvm_volgroup
        name: os
        devices: [part-lvm]
      - id: lv-root
        type: lvm_partition
        name: root
        volgroup: vg-os
        size: 7G
      - id: lv-var
        type: lvm_partition
        name: var
        volgroup: vg-os
        size: -1
      - id: fs-boot
        type: format
        volume: part-boot
        fstype: ext4
      - id: fs-efi
        type: format
        volume: part-efi
        fstype: fat32
      - id: fs-root
        type: format
        volume: lv-root
        fstype: ext4
      - id: fs-var
        type: format
        volume: lv-var
        fstype: ext4
      - id: mount-boot
        type: mount
        device: fs-boot
        path: /boot
      - id: mount-efi
        type: mount
        device: fs-efi
        path: /boot/efi
      - id: mount-root
        type: mount
        device: fs-root
        path: /
      - id: mount-var
        type: mount
        device: fs-var
        path: /var
  late-commands:
    - curtin in-target --target=/target -- grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=ubuntu --removable --recheck
